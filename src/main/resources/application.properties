# ========================================
# Application
# ========================================
spring.application.name=pedix-api

# ========================================
# Database - Oracle
# ========================================
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
spring.datasource.username=${DB_USERNAME:RM561052}
spring.datasource.password=${DB_PASSWORD:280798}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ========================================
# Connection Pool (HikariCP)
# ========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# ========================================
# Thymeleaf
# ========================================
spring.thymeleaf.cache=false

# ========================================
# Flyway
# ========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=false
spring.flyway.validate-migration-naming=true

# ========================================
# Script de inicializaÁ„o
# ========================================
spring.sql.init.mode=never

# ========================================
# Logging
# ========================================
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ========================================
# Swagger / OpenAPI
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ========================================
# Server
# ========================================
server.port=8080
server.error.whitelabel.enabled=false