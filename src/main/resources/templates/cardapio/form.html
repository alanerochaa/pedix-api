<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicao ? 'Editar item | Pedix' : 'Novo item | Pedix'}">Form | Pedix</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="pedix-body">

<header class="page-header">
    <div>
        <h1 th:text="${modoEdicao ? 'Editar item do cardápio' : 'Novo item do cardápio'}">Novo item</h1>
        <p>Preencha os dados do item do cardápio</p>
    </div>

    <div class="header-actions">
        <a th:href="@{/cardapio}" class="icon-btn secondary-btn" title="Voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </div>
</header>

<main class="content-area">
    <section class="card-default">
        <form th:object="${item}"
              th:action="@{${formAction}}"
              method="post"
              class="pedix-form pedix-form-light">

            <div class="form-grid">
                <div class="form-group-light">
                    <label for="nome">Nome</label>
                    <input id="nome"
                           type="text"
                           th:field="*{nome}"
                           placeholder="Ex: Hambúrguer clássico"
                           required>
                    <small class="field-error"
                           th:if="${#fields.hasErrors('nome')}"
                           th:errors="*{nome}"></small>
                </div>

                <div class="form-group-light">
                    <label for="preco">Preço</label>
                    <input id="preco"
                           type="number"
                           step="0.01"
                           min="0.01"
                           th:field="*{preco}"
                           placeholder="0.00"
                           required>
                    <small class="field-error"
                           th:if="${#fields.hasErrors('preco')}"
                           th:errors="*{preco}"></small>
                </div>

                <div class="form-group-light form-group-full">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao"
                              th:field="*{descricao}"
                              rows="4"
                              placeholder="Descreva o item"></textarea>
                    <small class="field-error"
                           th:if="${#fields.hasErrors('descricao')}"
                           th:errors="*{descricao}"></small>
                </div>

                <div class="form-group-light">
                    <label for="categoria">Categoria</label>
                    <select id="categoria" th:field="*{categoria}" required>
                        <option value="">Selecione</option>
                        <option value="PRATO">Prato</option>
                        <option value="BEBIDA">Bebida</option>
                        <option value="SOBREMESA">Sobremesa</option>
                    </select>
                    <small class="field-error"
                           th:if="${#fields.hasErrors('categoria')}"
                           th:errors="*{categoria}"></small>
                </div>

                <div class="form-group-light">
                    <label for="imagemUrl">URL da imagem</label>
                    <input id="imagemUrl"
                           type="url"
                           th:field="*{imagemUrl}"
                           placeholder="https://exemplo.com/imagem.jpg">
                    <small class="field-error"
                           th:if="${#fields.hasErrors('imagemUrl')}"
                           th:errors="*{imagemUrl}"></small>
                </div>
            </div>

            <div class="checkbox-line">
                <input id="disponivel" type="checkbox" th:field="*{disponivel}">
                <label for="disponivel">Item disponível</label>
            </div>

            <div class="form-actions-line">
                <button type="submit" class="primary-btn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    <span th:text="${modoEdicao ? 'Salvar alterações' : 'Cadastrar item'}">Salvar</span>
                </button>

                <a th:href="@{/cardapio}" class="outline-btn">
                    Cancelar
                </a>
            </div>
        </form>
    </section>
</main>

</body>
</html>
