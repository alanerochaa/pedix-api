<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe do pedido | Pedix</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="pedix-body">

<header class="page-header">
    <div>
        <h1>Detalhe do pedido</h1>
        <p>Acompanhamento operacional do pedido selecionado</p>
    </div>

    <div class="header-actions">
        <a th:href="@{/pedidos}" class="icon-btn secondary-btn" title="Voltar para pedidos">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <a th:href="@{/home}" class="icon-btn secondary-btn" title="Voltar para home">
            <i class="fa-solid fa-house"></i>
        </a>
    </div>
</header>

<main class="content-area">
    <section class="card-default order-detail-card">
        <div class="order-card-top">
            <div>
                <h2 class="order-title" th:text="|Pedido #${pedido.id}|">Pedido #1</h2>

                <p class="order-meta">
                    <span th:text="|Comanda #${pedido.comandaId}|">Comanda #1001</span>
                    <span class="meta-dot">•</span>
                    <span th:text="|Garçom: ${pedido.garcomResponsavel != null ? pedido.garcomResponsavel : 'N/A'}|">
                        Garçom: N/A
                    </span>
                </p>
            </div>

            <span class="order-status">
                <span th:text="${pedido.status != null ? pedido.status : 'EM_PREPARO'}">EM_PREPARO</span>
            </span>
        </div>

        <div class="order-card-body">
            <p class="order-observation"
               th:text="${pedido.observacao != null and !#strings.isEmpty(pedido.observacao) ? pedido.observacao : 'Sem observações registradas.'}">
                Sem observações registradas.
            </p>
        </div>

        <div class="order-card-footer">
            <div class="order-metrics">
                <div class="metric-chip highlight">
                    <i class="fa-solid fa-brazilian-real-sign"></i>
                    <span th:text="|Total: R$ ${#numbers.formatDecimal(pedido.total, 1, 'POINT', 2, 'COMMA')}|">
                        Total: R$ 0,00
                    </span>
                </div>
            </div>
        </div>
    </section>

    <div class="form-actions-line detail-page-actions">
        <a th:href="@{/pedidos}" class="outline-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar
        </a>

        <form sec:authorize="hasRole('ADMIN')"
              th:action="@{/pedidos/cancelar/{id}(id=${pedido.id})}"
              method="post">
            <button type="submit"
                    class="warning-btn"
                    onclick="return confirm('Deseja cancelar este pedido?');">
                <i class="fa-solid fa-ban"></i>
                Cancelar pedido
            </button>
        </form>
    </div>
</main>

</body>
</html>
