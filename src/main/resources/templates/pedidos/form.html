<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo pedido | Pedix</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="pedix-body">

<header class="page-header">
    <div>
        <h1>Novo pedido</h1>
        <p>Monte o pedido vinculando itens do cardápio</p>
    </div>

    <div class="header-actions">
        <a th:href="@{/pedidos}" class="icon-btn secondary-btn" title="Voltar para pedidos">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </div>
</header>

<main class="content-area">
    <section class="card-default">
        <form th:action="@{/pedidos/salvar}"
              th:object="${pedido}"
              method="post"
              class="pedix-form pedix-form-light">

            <div class="form-grid">
                <div class="form-group-light">
                    <label for="comandaId">Comanda</label>
                    <input id="comandaId"
                           type="number"
                           min="1"
                           th:field="*{comandaId}"
                           required>

                    <small class="field-error"
                           th:if="${#fields.hasErrors('comandaId')}"
                           th:errors="*{comandaId}"></small>
                </div>

                <div class="form-group-light form-group-full">
                    <label for="observacao">Observação</label>
                    <textarea id="observacao"
                              th:field="*{observacao}"
                              rows="4"
                              placeholder="Ex: retirar cebola, sem gelo, mesa próxima à janela..."></textarea>
                </div>

                <div class="form-group-light form-group-full">
                    <label>Itens do pedido</label>

                    <div th:if="${erroItens}"
                         class="feedback-box feedback-error"
                         th:text="${erroItens}"></div>

                    <div class="pedido-itens-lista">
                        <div class="pedido-item-row" th:each="item, stat : ${itensCardapio}">
                            <input type="hidden"
                                   th:name="${'itens[' + stat.index + '].itemCardapioId'}"
                                   th:value="${item.id}">

                            <div class="pedido-item-info">
                                <input type="checkbox"
                                       class="pedido-item-checkbox"
                                       th:id="${'selecionado_' + item.id}"
                                       onchange="toggleQuantidade(this)">

                                <label th:for="${'selecionado_' + item.id}" class="pedido-item-label">
                                    <span class="pedido-item-nome" th:text="${item.nome}">Item</span>
                                    <span class="pedido-item-preco"
                                          th:text="${'R$ ' + #numbers.formatDecimal(item.preco,1,'POINT',2,'COMMA')}">
                                        R$ 0,00
                                    </span>
                                </label>
                            </div>

                            <div class="pedido-item-quantidade">
                                <label th:for="${'qtd_' + item.id}">Qtd.</label>
                                <input type="number"
                                       min="0"
                                       value="0"
                                       th:id="${'qtd_' + item.id}"
                                       th:name="${'itens[' + stat.index + '].quantidade'}"
                                       readonly>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions-line">
                <button type="submit" class="primary-btn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Criar pedido
                </button>

                <a th:href="@{/pedidos}" class="outline-btn">
                    Cancelar
                </a>
            </div>
        </form>
    </section>
</main>

<script>
    function toggleQuantidade(checkbox) {
        const row = checkbox.closest('.pedido-item-row');
        const quantidadeInput = row.querySelector('.pedido-item-quantidade input');

        if (checkbox.checked) {
            quantidadeInput.readOnly = false;
            if (quantidadeInput.value === "0" || quantidadeInput.value === "") {
                quantidadeInput.value = 1;
            }
        } else {
            quantidadeInput.value = 0;
            quantidadeInput.readOnly = true;
        }
    }
</script>

</body>
</html>
